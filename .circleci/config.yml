version: 2
workflows:
  version: 2
  test:
    jobs:
      - unit_test:
          filters:
            tags:
              only: /.*/
      - checks:
          filters:
            tags:
              only: /.*/
      - dev_api_test:
          filters:
            tags:
              only: /.*/
      - dev_api_checks:
          filters:
            tags:
              only: /.*/
      - dev_frontend_test:
          filters:
            tags:
              only: /.*/
      - dev_frontend_checks:
          filters:
            tags:
              only: /.*/
      - coverage_finalize:
          requires: [unit_test, dev_api_test, dev_frontend_test]
          filters:
            tags:
              only: /.*/
      - build-and-release:
          requires: [unit_test, checks, dev_api_test, dev_api_checks, dev_frontend_test, dev_frontend_checks]
          filters:
            tags:
              only: /.*/
            branches:
              only:
                - master
      - update-description:
          requires: [build-and-release]
          filters:
            tags:
              only: /.*/
            branches:
              only:
                - master
jobs:
  unit_test:
    docker:
      - image: darthjee/circleci_tent-base:0.0.1
      - image: kennethreitz/httpbin
        name: httpbin
    steps:
      - checkout
      - run:
          name: Remove other folders
          command: rm -rf dev
      - run:
          name: Set folder
          command: mv source old; mv old/* ./; rm -rf old;
      - run:
          name: Copy dependencies
          command: cp /home/circleci/vendor/ ./vendor/ -R
      - run:
          name: composer install
          command: composer install
      - run:
          name: Tests
          command: composer coverage
      - run:
          name: Upload coverage to Codacy
          command: bash <(curl -Ls https://coverage.codacy.com/get.sh) report --partial -r coverage/clover.xml

  checks:
    docker:
      - image: darthjee/circleci_tent-base:0.0.1
    steps:
      - checkout
      - run:
          name: Remove other folders
          command: rm -rf dev
      - run:
          name: Copy files
          command: mv source old; mv old/* ./; rm -rf old;
      - run:
          name: Copy dependencies
          command: cp /home/circleci/vendor/ ./vendor/ -R
      - run:
          name: Install dependencies
          command: composer install
      - run:
          name: Run Lint
          command: composer lint

  dev_api_test:
    docker:
      - image: darthjee/circleci_tent-base:0.0.1
        environment:
          API_DEV_MYSQL_HOST: mysql
          API_DEV_MYSQL_PORT: 3306
          API_DEV_MYSQL_USER: tent
          API_DEV_MYSQL_PASSWORD: tent
          API_DEV_MYSQL_TEST_DATABASE: tent
      - image: cimg/mysql:8.0
        name: mysql
        environment:
          MYSQL_DATABASE: tent
          MYSQL_USER: tent
          MYSQL_PASSWORD: tent
          MYSQL_ROOT_PASSWORD: tent
    steps:
      - checkout
      - run:
          name: Remove other folders
          command: rm -rf source
      - run:
          name: Set folder
          command: mv dev/api/* ./; rm -rf dev;
      - run:
          name: Copy dependencies
          command: cp /home/circleci/vendor/ ./vendor/ -R
      - run:
          name: composer install
          command: composer install
      - run:
          name: Wait for DB
          command: php ./bin/wait_for_database.php
      - run:
          name: Ensure database exists
          command: php ./bin/create_databases.php
      - run:
          name: EnsurMigrate database
          command: php ./bin/migrate_databases.php
      - run:
          name: Tests
          command: composer coverage
      - run:
          name: Upload coverage to Codacy
          command: bash <(curl -Ls https://coverage.codacy.com/get.sh) report --partial -r coverage/clover.xml

  dev_api_checks:
    docker:
      - image: darthjee/circleci_tent-base:0.0.1
    steps:
      - checkout
      - run:
          name: Remove other folders
          command: rm -rf source
      - run:
          name: Set folder
          command: mv dev/api/* ./; rm -rf dev;
      - run:
          name: Copy dependencies
          command: cp /home/circleci/vendor/ ./vendor/ -R
      - run:
          name: Install dependencies
          command: composer install
      - run:
          name: Run Lint
          command: composer lint

  dev_frontend_test:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Remove other folders
          command: rm -rf source
      - run:
          name: Set folder
          command: mv dev/frontend/* ./; rm -rf dev;
      - run:
          name: Yarn install
          command: yarn install
      - run:
          name: Tests
          command: npm run coverage
      - run:
          name: Upload coverage to Codacy
          command: bash <(curl -Ls https://coverage.codacy.com/get.sh) report --partial -r coverage/lcov.info

  dev_frontend_checks:
    docker:
      - image: darthjee/circleci_node:0.2.1
    steps:
      - checkout
      - run:
          name: Remove other folders
          command: rm -rf source
      - run:
          name: Set folder
          command: mv dev/frontend/* ./; rm -rf dev;
      - run:
          name: Yarn install
          command: yarn install
      - run:
          name: Check JS Lint
          command: npm run lint

  coverage_finalize:
    docker:
      - image: darthjee/circleci_tent-base:0.0.1
    steps:
      - run:
          name: Finalize coverage on Codacy
          command: bash <(curl -Ls https://coverage.codacy.com/get.sh) final

  build-and-release:
    machine: true
    steps:
      - checkout
      - run:
          name: Create release package
          command: |
            if [ -z "${CIRCLE_TAG:-}" ]; then
              echo "Skipping package creation for non-tag build"
              exit 0
            fi

            RELEASE_PACKAGE="tent-${CIRCLE_TAG}-source.tar.gz"
            tar -czf "$RELEASE_PACKAGE" -C source/source .
            echo "RELEASE_PACKAGE=$RELEASE_PACKAGE" >> "$BASH_ENV"
      - run:
          name: Docker build
          command: |
            TAG=${CIRCLE_TAG:-latest}
            docker build --platform linux/amd64 -f dockerfiles/tent/Dockerfile source -t darthjee/tent:$TAG -t darthjee/tent:latest
      - run:
          name: Docker login
          command: echo "$DOCKER_HUB_PASSWORD" | docker login -u "$DOCKER_HUB_USERNAME" --password-stdin
      - run:
          name: Docker push
          command: |
            TAG=${CIRCLE_TAG:-latest}
            docker push darthjee/tent:$TAG
      - run:
          name: Docker release
          command: docker push darthjee/tent:latest
      - run:
          name: Upload release package
          command: |
            if [ -z "${CIRCLE_TAG:-}" ]; then
              echo "Skipping release package upload for non-tag build"
              exit 0
            fi

            if [ -z "${GITHUB_TOKEN:-}" ]; then
              echo "GITHUB_TOKEN is required to upload release assets"
              exit 1
            fi

            if [ -z "${RELEASE_PACKAGE:-}" ]; then
              RELEASE_PACKAGE="tent-${CIRCLE_TAG}-source.tar.gz"
            fi

            RELEASE_RESPONSE=$(curl --silent --show-error \
              -u "x-access-token:${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              -w '\n%{http_code}' \
              "https://api.github.com/repos/darthjee/tent/releases/tags/${CIRCLE_TAG}")
            RELEASE_STATUS=$(echo "$RELEASE_RESPONSE" | tail -n 1)
            RELEASE_DATA=$(echo "$RELEASE_RESPONSE" | sed '$d')

            if [ "$RELEASE_STATUS" = "404" ]; then
              RELEASE_PAYLOAD=$(python3 - <<'PY'
import json
import os

tag = os.environ["CIRCLE_TAG"]
print(json.dumps({
    "tag_name": tag,
    "name": tag,
    "generate_release_notes": True
}))
PY
)
              RELEASE_DATA=$(curl --silent --show-error --fail \
                -X POST \
                -u "x-access-token:${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                -d "$RELEASE_PAYLOAD" \
                "https://api.github.com/repos/darthjee/tent/releases")
            elif [ "$RELEASE_STATUS" != "200" ]; then
              echo "Failed to fetch release for tag ${CIRCLE_TAG} (HTTP ${RELEASE_STATUS})"
              echo "$RELEASE_DATA"
              exit 1
            fi

            if [ -z "$RELEASE_DATA" ]; then
              echo "Release data is empty for tag ${CIRCLE_TAG}"
              exit 1
            fi

            RELEASE_ID=$(echo "$RELEASE_DATA" | python3 - <<'PY'
import json
import sys

data = json.load(sys.stdin)
print(data["id"])
PY
)
            UPLOAD_URL=$(echo "$RELEASE_DATA" | python3 - <<'PY'
import json
import sys

data = json.load(sys.stdin)
print(data["upload_url"].split("{")[0])
PY
)

            ASSETS_DATA=$(curl --silent --show-error --fail \
              -u "x-access-token:${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/darthjee/tent/releases/${RELEASE_ID}/assets")

            EXISTING_ASSET_ID=$(echo "$ASSETS_DATA" | python3 - "$RELEASE_PACKAGE" <<'PY'
import json
import sys

name = sys.argv[1]
for asset in json.load(sys.stdin):
    if asset.get("name") == name:
        print(asset["id"])
        break
PY
)

            if [ -n "$EXISTING_ASSET_ID" ]; then
              curl --silent --show-error --fail \
                -X DELETE \
                -u "x-access-token:${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/darthjee/tent/releases/assets/${EXISTING_ASSET_ID}"
            fi

            curl --silent --show-error --fail \
              -X POST \
              -u "x-access-token:${GITHUB_TOKEN}" \
              -H "Content-Type: application/gzip" \
              --data-binary @"${RELEASE_PACKAGE}" \
              "${UPLOAD_URL}?name=${RELEASE_PACKAGE}"
  update-description:
    docker:
      - image: darthjee/scripts:0.6.0
    steps:
      - checkout
      - run:
          name: Docker push description
          command: /bin/sh /home/scripts/sbin/docker_hub.sh login_and_push_description darthjee/tent DOCKERHUB_DESCRIPTION.md
